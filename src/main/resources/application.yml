spring:
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yu_ai_code_mother
    username: root
    password: chen
  session:
    store-type: redis
    #    session三十天过期
    timeout: 2592000
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600
  application:
    name: yu-ai-code-mother
server:
  port: 8123
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.chen.yuaicodemother.controller
knife4j:
  enable: true
  setting:
    language: zh_cn
minio:
  endpoint: http://localhost:9005        # MinIO服务地址
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}                  # 账号
  secretKey: ${MINIO_SECRET_KEY:minioadmin}                  # 密码
  bucket: my-images                      # 桶名（提前在控制台建好）
#Pexels图片搜索配置
pexels:
  api-key: ${PEXELS_API_KEY:}
# 阿里云 DashScope 配置
dashscope:
  api-key: ${DASHSCOPE_API_KEY:}
  image-model: wan2.2-t2i-flash
